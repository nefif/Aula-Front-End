  <title>Audio, Vídeo, PDF, YouTube e Google Maps</title>
</head>
<body>
  <h1>Exemplo de mídia integrada</h1>

  <section>
    <h2>Áudio</h2>
    <audio controls>
      <source src="assets/John Denver - Take Me Home, Country Roads (Official Audio) - JohnDenverVEVO (youtube).mp3.mpeg" type="audio/mpeg">

      <source src="assets/Gravando 2026-06-18 174340.mp4" type="video/mp4">

<iframe width="560" height="315" src="https://www.youtube-nocookie.com/embed/hGjqGIxiu3s?si=NoUPWrTV82hqfT5F&amp;start=600" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>  </section>
