
<!doctype html>
<html lang="pt-BR">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Formulário - Exemplos de Inputs</title>
</head>
<body>
	<h1>Formulário - Exemplos de inputs e botões</h1>
	<form action="#" method="post" enctype="multipart/form-data">
		<!-- Fieldset: Agrupa campos de informações básicas do usuário -->
		<fieldset>
			<legend>Informações básicas</legend>
			<!-- Input type="text": Campo de texto simples para nome completo -->
			<label for="nome">Nome completo</label>
			<input id="nome" name="nome" type="text" placeholder="Seu nome" required value="...">

			<!-- Input type="email": Campo validado para endereço de email -->
			<label for="email">E-mail</label>
			<input id="email" name="email" type="email" placeholder="seu@exemplo.com" required>

			<!-- Input type="password": Campo que oculta o texto digitado -->
			<label for="senha">Senha</label>
			<input id="senha" name="senha" type="password" placeholder="senha segura" required>

			<div class="row">
				<div class="col">
					<!-- Input type="tel": Campo para números de telefone -->
					<label for="telefone">Telefone</label>
					<input id="telefone" name="telefone" type="tel" placeholder="(11) 99999-9999">
				</div>
				<div class="col">
					<!-- Input type="url": Campo validado para URLs/websites -->
					<label for="url">Website</label>
					<input id="url" name="url" type="url" placeholder="https://">
				</div>
			</div>
		</fieldset>

		<!-- Fieldset: Agrupa campos numéricos, data e cor -->
		<fieldset>
			<legend>Tipos numéricos, data e cor</legend>
			<!-- Input type="number": Campo para entrada de números com min/max e valor padrão -->
			<label for="idade">Idade (number)</label>
			<input id="idade" name="idade" type="number" min="0" max="120" value="30">

			<!-- Input type="range": Controle deslizante para seleção de valor em intervalo -->
			<label for="salario">Salário (range)</label>
			<input id="salario" name="salario" type="range" min="0" max="10000" step="100" value="2500">

			<div class="row">
				<div class="col">
					<!-- Input type="date": Seletor de data do calendário -->
					<label for="nascimento">Data de nascimento</label>
					<input id="nascimento" name="nascimento" type="date">
				</div>
				<div class="col">
					<!-- Input type="time": Seletor de hora -->
					<label for="hora">Hora preferida</label>
					<input id="hora" name="hora" type="time">
				</div>
				<div class="col">
					<!-- Input type="color": Seletor de cor com paleta visual -->
					<label for="cor">Cor favorita</label>
					<input id="cor" name="cor" type="color" value="#ff6600">
				</div>
			</div>
		</fieldset>

		<!-- Fieldset: Agrupa campos de opções e seleção múltipla -->
		<fieldset>
			<legend>Opções e seleção</legend>
			<!-- Input type="radio": Botões de opção exclusiva (apenas uma seleção) -->
			<label>Gênero</label>
			<label><input type="radio" name="genero" value="f"> Feminino</label>
			<label><input type="radio" name="genero" value="m"> Masculino</label>
			<label><input type="radio" name="genero" value="o"> Outro</label>

			<!-- Input type="checkbox": Caixa de seleção (múltiplas seleções permitidas) -->
			<label><input type="checkbox" name="aceito" checked> Aceito receber novidades</label>

			<!-- Select simples: Lista suspensa com uma única seleção -->
			<label for="profissao">Profissão (select)</label>
			<select id="profissao" name="profissao">
				<option value="">-- selecione --</option>
				<option>Desenvolvedor</option>
				<option>Designer</option>
				<option>Gerente</option>
				<option>Estudante</option>
			</select>

			<!-- Select múltiplo: Lista com seleção de múltiplos itens -->
			<label for="skills">Habilidades (multiple)</label>
			<select id="skills" name="skills" multiple size="4">
				<option>HTML</option>
				<option>CSS</option>
				<option>JavaScript</option>
				<option>React</option>
			</select>
		</fieldset>

		<!-- Fieldset: Agrupa campos de texto longo, arquivo e pesquisa -->
		<fieldset>
			<legend>Texto, arquivo e pesquisa</legend>
			<!-- Textarea: Área de texto multilinha para textos longos -->
			<label for="bio">Biografia</label>
			<textarea id="bio" name="bio" rows="4" placeholder="Escreva algo..."></textarea>

			<!-- Input type="file": Seletor de arquivo para upload -->
			<label for="arquivo">Enviar arquivo</label>
			<input id="arquivo" name="arquivo" type="file">

			<!-- Input type="search": Campo otimizado para busca -->
		</br>
			<label for="busca">Pesquisar</label>
			<input id="busca" name="busca" type="search" placeholder="Buscar...">
		</fieldset>


		<div style="display:flex;gap:8px">
			<button type="submit">Enviar</button>
			<button type="reset">Limpar</button>
			<button type="button" onclick="alert('Ação personalizada')">Botão</button>
		</div>
	</form>
</body>
</html>
