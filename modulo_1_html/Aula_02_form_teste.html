<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main>
        <form 
            action="#" 
            method="post" 
            enctype="multipart/form-data"
        >
        <fieldset>
            <legend>Informações básicas</legend>
            <input type="text" placeholder="Digite o nome do usuário" required>
            <input type="email" placeholder="Digite o e-mail do usuário" required>
            <input type="password" placeholder="Digite a senha do usuário" required> 
        </fieldset>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
        <input type="button" value="Clique aqui" onclick="alert('Botão clicado!')">

        </form>
    </main>        
</body>
</html>
