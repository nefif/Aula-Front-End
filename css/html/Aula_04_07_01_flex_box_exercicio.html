<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox com Direção Column</title>
    <style>
        .pai {
            height: 600px; 
            border: 3px dashed #ff6600; 
            gap: 15px; 
        }
        .filho {
            background-color: #3399cc;
            color: #fff;
            padding: 20px;
            font-family: sans-serif;
            font-weight: bold;
            border-radius: 4px;      
            width: 250px; 
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="pai">
        <div class="filho">item 1</div>
        <div class="filho">item 2</div>
        <div class="filho">item 3</div>
        <div class="filho">item 4</div>
        <div class="filho">item 5</div>
        <div class="filho">item 6</div>
    </div>

</body>
</html>
