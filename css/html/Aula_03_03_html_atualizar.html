<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style_2.css">

    <title>Atualizar Currículo</title>

</head>

<body>

<header>

<h1>Atualizar Currículo</h1>

<nav>

<a href="Aula_03_01_html_index.html">
Currículo
</a>

|

<a href="Aula_03_02_html_contato.html">
Contato
</a>

</nav>

</header>

<main>

<form
action="#"
method="post"
enctype="multipart/form-data">

<fieldset>

<legend>
Informações Pessoais
</legend>

<label for="nome">
Nome
</label>

<input
id="nome"
name="nome"
type="text"
required>

<br><br>

<label for="email">
Email
</label>

<input
id="email"
name="email"
type="email"
required>

<br><br>

<label for="senha">
Senha
</label>

<input
id="senha"
name="senha"
type="password"
required>

<br><br>

<label for="nascimento">
Data de nascimento
</label>

<input
id="nascimento"
name="nascimento"
type="date">

<br><br>

<label for="cor">
Cor favorita
</label>

<input
id="cor"
name="cor"
type="color">

</fieldset>

<br>

<fieldset>

<legend>
Perfil Profissional
</legend>

<p>
Gênero
</p>

<label>

<input
type="radio"
name="genero"
value="masculino">

Masculino

</label>

<label>

<input
type="radio"
name="genero"
value="feminino">

Feminino

</label>

<label>

<input
type="radio"
name="genero"
value="outro">

Outro

</label>

<br><br>

<label for="habilidades">
Habilidades
</label>

<select
id="habilidades"
name="habilidades"
multiple>

<option>HTML</option>
<option>CSS</option>
<option>JavaScript</option>
<option>React</option>

</select>

<br><br>

<label for="observacoes">
Observações
</label>

<br>

<textarea
id="observacoes"
name="observacoes"
rows="5"
cols="40">
</textarea>

<br><br>

<label for="foto">
Upload de foto
</label>

<input
id="foto"
name="foto"
type="file">

</fieldset>

<br>

<button class="btn-2 btn-atualizar" type="submit">
Salvar Currículo
</button>

<button class="btn-2 btn-limpar" type="reset">
Limpar
</button>

</form>

</main>

<footer>

<p>

<a href="Aula_03_01_html_index.html">
Voltar ao currículo
</a>

</p>

</footer>

</body>

</html>
