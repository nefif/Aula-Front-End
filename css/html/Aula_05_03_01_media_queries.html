<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividade Prática: Media Query</title>
  <style>
    /* Reset básico */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
      color: #1e293b;
      text-align: center;
    }

    p {
      margin-bottom: 20px;
      color: #64748b;
      text-align: center;
    }

    /* ==========================================================
       1. CÓDIGO BASE (DESKTOP)
       Caixa Azul por padrão
       ========================================================== */
    .caixa {
      width: 300px;
      height: 300px;
      background-color: #2563eb; /* Azul */
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      transition: background-color 0.3s ease; /* Animação suave na troca de cor */
    }

    /* ==========================================================
       2. ESPAÇO PARA O ALUNO ESCREVER A MEDIA QUERY
       (Deixe este espaço para eles resolverem na aula)
       ========================================================== */

  </style>
</head>
<body>

  <h1>Atividade: Mude a Cor da caixa</h1>
  <p>Abra o F12 e redimensione a tela ou simule um celular.</p>

  <!-- Caixa de Exemplo -->
  <div class="caixa">
    Caixa de Exemplo
  </div>

</body>
</html>
