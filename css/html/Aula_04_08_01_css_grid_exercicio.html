<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid com Colunas e Linhas Explícitas</title>
    <style>
        /* 1. O CONTAINER PAI (Define toda a estrutura externa) */
        .pai {
            border: 3px dashed #ff6600; 
            padding: 10px;
            background-color: #f0f0f0;
        }

        /* Estilo base para todos os filhos */
        .filho {
            color: #0a0909;
            padding: 20px;
            font-family: sans-serif;
            font-weight: bold;
            border-radius: 4px;
            text-align: center;
            border: 2px solid #ff6600;
        }
    </style>
</head>
<body>

    <div class="pai">
        <!-- Mudamos as classes para simular as seções de um site real -->
        <div class="filho header">Header (Topo)</div>
        <div class="filho sidebar">Sidebar (Lateral)</div>
        <div class="filho conteudo">Content (Conteúdo)</div>
        <div class="filho main">Main Content (Conteúdo)</div>
        <div class="filho footer">Footer (Rodapé)</div>
    </div>

</body>
</html>
