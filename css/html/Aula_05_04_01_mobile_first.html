<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
<style>

  * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

  body{
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .card{
      width: 300px;
      height: 300px;
      background-color: #2563eb; /* Azul */
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 12px;
  }

    @media(min-width:768px){
    .card{
        width: 600px;
        height: 600px;
    }
  }

    @media(min-width:1200px){
    .card{
        width:100%;
    }
  }

</style>
</head>
<body>
    <div class="card">
        item 1
    </div>
</body>
</html>
