<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style_3.css">
    <title>Entre em Contato</title>

</head>

<body>

<header>

    <h1>Entre em Contato</h1>

    <nav>
        <a href="Aula_03_01_html_index.html">Currículo</a> |
        <a href="Aula_03_html_atualizar.html">Atualizar Currículo</a>
    </nav>

</header>

<main>

<form action="#" method="post">

<fieldset>

<legend>Informações para Contato</legend>

<label for="nome">
Nome
</label>

<input
id="nome"
name="nome"
type="text"
required>

<br><br>

<label for="email">
E-mail
</label>

<input
id="email"
name="email"
type="email"
required>

<br><br>

<label for="telefone">
Telefone
</label>

<input
id="telefone"
name="telefone"
type="tel">

<br><br>

<label for="mensagem">
Mensagem
</label>

<br>

<textarea
id="mensagem"
name="mensagem"
rows="6"
cols="40">
</textarea>

<br><br>

</fieldset>

<button type="submit">
Enviar
</button>

<button type="reset">
Limpar
</button>

</form>

</main>

<footer>

<p>

<a href="Aula_03_01_html_index.html">
Voltar ao currículo
</a>

</p>

</footer>

</body>

</html>
