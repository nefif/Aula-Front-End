<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explicando Flexbox com Pai e Filho</title>
    <style>
        .pai {
            display: flex;
            flex-direction: row; 
            flex-wrap: wrap; 
            justify-content: center; 
            align-items: center;
            height: 600px; 
            border: 3px dashed #ff6600; 
            gap: 15px; 
        }

        .filho {
            background-color: #3399cc;
            color: #fff;
            padding: 20px;
            font-family: sans-serif;
            font-weight: bold;
            border-radius: 4px;
            
            /* 3. Forçamos cada item a ser grande (250px). 
               Como 6 itens x 250px = 1500px (mais os gaps), eles não vão caber 
               na maioria das telas de monitores normais e celulares, forçando o WRAP. */
            width: 250px; 
            text-align: center;
        }


    </style>
</head>
<body>

    <div class="pai">
        <div class="filho">item 1</div>
        <div class="filho">item 2</div>
        <div class="filho">item 3</div>
        <div class="filho">item 4</div>
        <div class="filho">item 5</div>
        <div class="filho">item 6</div>
    </div>

</body>
</html>
